# Example nginx site for the Claude Code SSH terminal bridge.
#
# Install (Debian/Ubuntu style):
#   1. sudo apt install nginx
#   2. Copy this file to /etc/nginx/sites-available/claude-bridge (adjust paths/names).
#   3. sudo ln -sf /etc/nginx/sites-available/claude-bridge /etc/nginx/sites-enabled/
#   4. sudo nginx -t && sudo systemctl reload nginx
#
# Run uvicorn bound to loopback only (nginx is the public entrypoint):
#   uvicorn app.main:app --host 127.0.0.1 --port 8000
#
# The map must live in http context — site files under sites-enabled/ are included
# inside http { }, so this is valid on stock Ubuntu nginx layouts.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# --- HTTP: redirect to HTTPS after you have certificates (optional) ---
# server {
#     listen 80;
#     listen [::]:80;
#     server_name your.domain.example;
#     return 301 https://$host$request_uri;
# }

# --- HTTP: reverse proxy only (ok for private networks / first test) ---
server {
    listen 80;
    listen [::]:80;
    server_name your.domain.example;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        # Long-lived WebSocket + terminal session
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

