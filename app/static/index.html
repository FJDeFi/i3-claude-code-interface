<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#fff8ef" />
    <title>Claude Code Interface</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <link rel="stylesheet" href="static/styles.css?v=20260505-clean-hero" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="hero-copy-wrap">
          <h1>Claude Code</h1>
        </div>
        <div class="hero-status" id="connection-card">
          <span class="status-dot" id="status-dot"></span>
          <div>
            <p class="status-label">Session</p>
            <p class="status-value" id="server-status">Disconnected</p>
          </div>
        </div>
      </section>

      <section class="panel">
        <header class="panel-header">
          <div>
            <h2>Terminal</h2>
          </div>
          <div class="panel-buttons">
            <button class="primary-button" id="connection-toggle-btn" type="button">Connect</button>
          </div>
        </header>

        <div class="terminal-wrap" id="terminal-wrap"></div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit/lib/xterm-addon-fit.js"></script>
    <script src="static/app.js?v=20260505-clean-hero" defer></script>
  </body>
</html>
