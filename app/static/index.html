<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#fff8ef" />
    <title>Claude Code Interface</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <link rel="stylesheet" href="static/styles.css?v=20260505-clean-hero" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="hero-copy-wrap">
          <h1>Claude Code</h1>
        </div>
        <div class="hero-status" id="connection-card">
          <span class="status-dot" id="status-dot"></span>
          <div>
            <p class="status-label">Session</p>
            <p class="status-value" id="server-status">Disconnected</p>
          </div>
        </div>
      </section>

      <section class="panel">
        <header class="panel-header">
          <div>
            <h2>Terminal</h2>
          </div>
          <div class="panel-buttons panel-buttons--terminal">
            <div class="session-picker">
              <span class="session-picker__label">Select a session</span>
              <select id="session-select">
                <option value="__create__">Create a new session</option>
              </select>
            </div>
            <button class="primary-button" id="connection-toggle-btn" type="button">Connect</button>
          </div>
        </header>

        <div class="terminal-wrap" id="terminal-wrap"></div>
      </section>

      <section class="panel token-panel hidden" id="token-management-panel">
        <header class="panel-header">
          <div>
            <h2>Token Management</h2>
            <p>Owner and administrator access only.</p>
          </div>
          <div class="panel-buttons">
            <button class="ghost-button" id="refresh-tokens-btn" type="button">Refresh</button>
          </div>
        </header>

        <div class="token-status" id="token-status"></div>

        <form class="token-form" id="create-token-form">
          <label class="token-field">
            <span>TTL</span>
            <div class="token-field__row">
              <input id="token-ttl-value" type="number" min="1" step="1" placeholder="30" />
              <select id="token-ttl-unit">
                <option value="minutes" selected>Minutes</option>
                <option value="hours">Hours</option>
                <option value="days">Days</option>
              </select>
            </div>
          </label>

          <label class="token-field">
            <span>Guest access</span>
            <select id="token-access-type">
              <option value="viewer" selected>Viewer (Read-only)</option>
              <option value="editor">Editor (Read/Write/Execute)</option>
            </select>
          </label>

          <label class="token-field token-field--sessions">
            <span>Sessions</span>
            <div class="token-field__row token-field__row--sessions">
              <select id="token-session-mode">
                <option value="all" selected>All sessions</option>
                <option value="specific">Specific sessions</option>
              </select>
            </div>
          </label>

          <div class="token-form__actions token-form__actions--inline">
            <button class="primary-button" id="create-token-btn" type="submit">Create guest token</button>
          </div>
        </form>

        <section class="token-result hidden" id="token-result"></section>

        <div class="token-list" id="token-list"></div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit/lib/xterm-addon-fit.js"></script>
    <script src="static/app.js?v=20260505-clean-hero" defer></script>
    <div class="modal hidden" id="session-modal" role="dialog" aria-modal="true">
      <div class="modal__content">
        <header class="modal__header">
          <h3>Create a new session</h3>
          <button class="ghost-button" id="session-modal-close" type="button">Close</button>
        </header>
        <form id="session-modal-form" class="modal__form">
          <label>
            <span>Session name</span>
            <input id="session-modal-name" type="text" placeholder="session-name" />
          </label>
          <label>
            <span>Optional path</span>
            <input id="session-modal-path" type="text" placeholder="/home/user" />
          </label>
          <div class="modal__actions">
            <button class="primary-button" type="submit">Create session</button>
          </div>
        </form>
      </div>
    </div>
    <div class="modal hidden" id="token-sessions-modal" role="dialog" aria-modal="true">
      <div class="modal__content">
        <header class="modal__header">
          <h3>Select sessions</h3>
          <button class="ghost-button" id="token-sessions-modal-close" type="button">Close</button>
        </header>
        <form id="token-sessions-modal-form" class="modal__form">
          <label>
            <span>Select sessions this token may have access to</span>
            <div id="token-sessions-list" class="session-checkbox-list"></div>
          </label>
          <div class="modal__actions">
            <button class="primary-button" type="submit">Save selection</button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
